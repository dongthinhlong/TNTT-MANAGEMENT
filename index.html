    <style>
      :root {
        --sb-track-color: transparent;
        --sb-thumb-color: #e2e8f0;
        --sb-size: 6px;
      }
      body { 
        font-family: 'Outfit', sans-serif; 
        background-color: #fafafa;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .custom-scrollbar::-webkit-scrollbar { width: var(--sb-size); height: var(--sb-size); }
      .custom-scrollbar::-webkit-scrollbar-track { background: var(--sb-track-color); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--sb-thumb-color); border-radius: 10px; }
      @supports not selector(::-webkit-scrollbar) {
        .custom-scrollbar { scrollbar-color: var(--sb-thumb-color) var(--sb-track-color); }
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
